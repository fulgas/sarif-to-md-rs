name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Stable on all platforms
          - os: ubuntu-latest
            rust-version: stable
            coverage: true
          - os: macos-latest
            rust-version: stable
          - os: windows-latest
            rust-version: stable
          # Beta and MSRV only on Ubuntu
          - os: ubuntu-latest
            rust-version: beta
          - os: ubuntu-latest
            rust-version: 1.90.0  # MSRV

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain (${{ matrix.rust-version }})
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust-version }}
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
          key: ${{ matrix.rust-version }}-nextest

      - name: Install cargo-nextest
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2
        with:
          tool: cargo-nextest

      - name: Install cargo-llvm-cov
        if: matrix.coverage
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2
        with:
          tool: cargo-llvm-cov

      - name: Run tests with nextest
        run: cargo nextest run --verbose

      - name: Check benchmark compilation
        run: cargo bench --no-run

      - name: Check documentation builds
        run: cargo doc --no-deps --document-private-items

      - name: Generate code coverage
        if: matrix.coverage
        run: cargo llvm-cov nextest --all-features --workspace --cobertura --output-path cobertura.xml

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Code Coverage Summary Report
        if: matrix.coverage && github.event_name == 'pull_request'
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'
